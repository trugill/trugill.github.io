<!-- Replace your existing contact form with this -->
<form class="contact-form" action="https://formsubmit.co/your-email@example.com" method="POST">
    <!-- Honeypot to prevent spam -->
    <input type="text" name="_honey" style="display:none">
    
    <!-- Disable captcha -->
    <input type="hidden" name="_captcha" value="false">
    
    <!-- Custom success page (optional) -->
    <input type="hidden" name="_next" value="https://yourdomain.com/thanks.html">
    
    <!-- Subject line -->
    <input type="hidden" name="_subject" value="New Contact Form Submission!">
    
    <div class="form-row">
        <div class="form-group">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName" name="First_Name" required>
        </div>
        <div class="form-group">
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" name="Last_Name" required>
        </div>
    </div>

    <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required>
    </div>

    <div class="form-group">
        <label for="subject">Subject</label>
        <input type="text" id="subject" name="subject" required>
    </div>

    <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5" required></textarea>
    </div>

    <button type="submit" class="btn-submit">
        Send Message
        <span class="btn-arrow">→</span>
    </button>
</form>
